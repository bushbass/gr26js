<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Tracker</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f7f8fa;
      color: #1a1a1a;
    }

    header {
      position: sticky;
      top: 0;
      background: #ffffff;
      border-bottom: 1px solid #dedede;
      z-index: 10;
    }

    .nav-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      align-items: center;
    }

    .nav-row a {
      text-decoration: none;
      color: #1a1a1a;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      border: 1px solid transparent;
      font-weight: 600;
    }

    .nav-row a.active,
    .nav-row a:hover {
      background: #1a73e8;
      color: white;
      border-color: rgba(26, 115, 232, 0.9);
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #dedede;
      background: #fafbfc;
    }

    .filter-row button {
      border: 1px solid #c0c0c0;
      border-radius: 6px;
      background: white;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
      font-weight: 600;
    }

    .filter-row button.active {
      background: #1a73e8;
      border-color: rgba(26, 115, 232, 0.9);
      color: white;
    }

    main {
      padding: 1rem;
      max-width: 940px;
      margin: 0 auto;
    }

    .product-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 0.5rem;
    }

    .product-card {
      background: white;
      border: 1px solid #dedede;
      border-radius: 8px;
      padding: 0.9rem;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto;
      align-items: center;
      gap: 0.75rem;
    }

    .product-card a {
      font-weight: 700;
      color: #1a1a1a;
      text-decoration: none;
    }

    .product-card a:hover {
      text-decoration: underline;
    }

    .product-meta {
      color: #555;
      font-size: 0.9rem;
    }

    .qty-controls {
      display: flex;
      gap: 0.25rem;
      align-items: center;
    }

    .qty-controls button {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 6px;
      border: 1px solid #c0c0c0;
      background: white;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .qty-display {
      width: 3rem;
      text-align: center;
      font-weight: 700;
    }

    form {
      display: grid;
      gap: 0.75rem;
      max-width: 520px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-weight: 600;
      font-size: 0.95rem;
    }

    input,
    select {
      padding: 0.6rem 0.7rem;
      border-radius: 8px;
      border: 1px solid #c0c0c0;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
    }

    .button-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .button-row button {
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      border: 1px solid #c0c0c0;
      background: white;
      cursor: pointer;
      font-weight: 700;
    }

    .button-row button.primary {
      background: #1a73e8;
      border-color: rgba(26, 115, 232, 0.9);
      color: white;
    }

    .button-row button.danger {
      background: #d93025;
      border-color: rgba(217, 48, 37, 0.9);
      color: white;
    }

    .message {
      padding: 0.75rem 0.9rem;
      border-radius: 8px;
      border: 1px solid transparent;
      margin-bottom: 1rem;
    }

    .message.success {
      background: #e6f4ea;
      border-color: #a7d7a8;
      color: #0f5132;
    }

    .message.error {
      background: #f8d7da;
      border-color: #f5c2c7;
      color: #842029;
    }

    .back-to-top {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 2.5rem;
      padding: 0.7rem 1rem;
      border-radius: 999px;
      border: 1px solid #c0c0c0;
      background: white;
      cursor: pointer;
      font-weight: 700;
    }

    @media (max-width: 600px) {
      .product-card {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }

      .qty-controls {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav-row" aria-label="Primary">
      <a href="#/" data-nav="home">Home</a>
      <a href="#/add" data-nav="add">Add Products</a>
    </nav>
    <div class="filter-row" aria-label="Filters">
      <button data-filter="all" class="active">All</button>
      <button data-filter="soil">Soil</button>
      <button data-filter="mulch">Mulch</button>
      <button data-filter="stone">Stone</button>
      <button data-filter="paver">Paver</button>
      <button data-toggle="needed">Needed</button>
      <button data-action="reset">Reset</button>
    </div>
  </header>

  <main id="app">
    <!-- SPA content rendered here -->
  </main>

  <footer style="padding: 1rem; text-align: center; font-size: 0.9rem; color: #666;">
    Built with vanilla JavaScript and localStorage.
  </footer>

  <script>
    const STORAGE_KEY = 'product-tracker:products';
    const CATEGORY_OPTIONS = ['soil', 'mulch', 'stone', 'paver'];

    function loadProducts() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.map((p) => ({
          id: p.id,
          name: String(p.name ?? '').trim(),
          quantity: Number(p.quantity ?? 0),
          aisle: String(p.aisle ?? '').trim(),
          bay: Number(p.bay ?? 0),
          sku: Number(p.sku ?? 0),
          category: CATEGORY_OPTIONS.includes(p.category) ? p.category : 'soil',
        }));
      } catch (err) {
        console.warn('Failed to load products', err);
        return [];
      }
    }

    function saveProducts(products) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
    }

    function findProduct(id) {
      const products = loadProducts();
      return products.find((p) => p.id === id);
    }

    function setActiveNav(route) {
      document.querySelectorAll('nav a').forEach((a) => {
        a.classList.toggle('active', a.getAttribute('data-nav') === route);
      });
    }

    const state = {
      filterCategory: 'all',
      showNeededOnly: false,
    };

    function setFilterCategory(category) {
      state.filterCategory = category;
      updateFilterButtons();
      if (location.hash.startsWith('#/')) renderRoute();
    }

    function toggleNeeded() {
      state.showNeededOnly = !state.showNeededOnly;
      updateFilterButtons();
      if (location.hash.startsWith('#/')) renderRoute();
    }

    function updateFilterButtons() {
      document.querySelectorAll('[data-filter]').forEach((btn) => {
        const kind = btn.getAttribute('data-filter');
        btn.classList.toggle('active', kind === state.filterCategory);
      });

      const neededBtn = document.querySelector('[data-toggle="needed"]');
      neededBtn.classList.toggle('active', state.showNeededOnly);
      neededBtn.textContent = state.showNeededOnly ? 'Needed ✓' : 'Needed';
    }

    function applyFilters(products) {
      let items = products.slice();
      if (state.filterCategory !== 'all') {
        items = items.filter((p) => p.category === state.filterCategory);
      }
      if (state.showNeededOnly) {
        items = items.filter((p) => p.quantity > 0);
      }
      return items;
    }

    function sortProducts(products) {
      return products.slice().sort((a, b) => {
        const cat = a.category.localeCompare(b.category);
        if (cat !== 0) return cat;
        const aisleA = a.aisle || '';
        const aisleB = b.aisle || '';
        const aisleCmp = aisleA.localeCompare(aisleB, undefined, { numeric: true });
        if (aisleCmp !== 0) return aisleCmp;
        return a.bay - b.bay;
      });
    }

    function renderHome() {
      setActiveNav('home');
      const app = document.getElementById('app');
      const allProducts = loadProducts();
      const filtered = applyFilters(allProducts);
      const sorted = sortProducts(filtered);

      const list = document.createElement('ul');
      list.className = 'product-list';

      if (!sorted.length) {
        const empty = document.createElement('p');
        empty.textContent = 'No products found. Add one using "Add Products" above.';
        app.innerHTML = '';
        app.appendChild(empty);
        app.appendChild(renderBackToTop());
        return;
      }

      sorted.forEach((product) => {
        const item = document.createElement('li');
        item.className = 'product-card';

        const link = document.createElement('a');
        link.href = '#/product/' + product.id;
        link.textContent = product.name || '(Unnamed product)';

        const meta = document.createElement('div');
        meta.className = 'product-meta';
        meta.textContent = `${product.category} • Aisle ${product.aisle || '-'} • Bay ${product.bay ?? '-'} • SKU ${product.sku ?? '-'}`;

        const qty = document.createElement('div');
        qty.className = 'qty-display';
        qty.textContent = product.quantity;

        const controls = document.createElement('div');
        controls.className = 'qty-controls';

        const dec = document.createElement('button');
        dec.type = 'button';
        dec.textContent = '-';
        dec.disabled = product.quantity <= 0;
        dec.addEventListener('click', () => {
          updateQuantity(product.id, -1);
        });

        const inc = document.createElement('button');
        inc.type = 'button';
        inc.textContent = '+';
        inc.addEventListener('click', () => {
          updateQuantity(product.id, 1);
        });

        controls.appendChild(dec);
        controls.appendChild(qty);
        controls.appendChild(inc);

        item.appendChild(link);
        item.appendChild(meta);
        item.appendChild(controls);

        list.appendChild(item);
      });

      app.innerHTML = '';
      app.appendChild(list);
      app.appendChild(renderBackToTop());
    }

    function renderBackToTop() {
      const btn = document.createElement('button');
      btn.className = 'back-to-top';
      btn.type = 'button';
      btn.textContent = 'Back to top';
      btn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      return btn;
    }

    function updateQuantity(id, delta) {
      const products = loadProducts();
      const idx = products.findIndex((p) => p.id === id);
      if (idx === -1) return;
      products[idx].quantity = Math.max(0, Number(products[idx].quantity) + delta);
      saveProducts(products);
      renderHome();
    }

    function renderProductDetail(productId) {
      const product = findProduct(productId);
      if (!product) {
        renderNotFound('Product not found.');
        return;
      }

      setActiveNav('');
      const app = document.getElementById('app');
      app.innerHTML = '';

      const header = document.createElement('h1');
      header.textContent = 'Edit Product';

      const message = document.createElement('div');
      message.id = 'message';

      const form = document.createElement('form');
      form.addEventListener('submit', (event) => {
        event.preventDefault();
        commitEdit(productId);
      });

      const nameLabel = createInput('Product Name', 'name', product.name);
      const quantityLabel = createInput('Quantity', 'quantity', product.quantity, 'number');
      const aisleLabel = createInput('Aisle', 'aisle', product.aisle);
      const bayLabel = createInput('Bay', 'bay', product.bay, 'number');
      const skuLabel = createInput('SKU', 'sku', product.sku, 'number');
      const categoryLabel = createSelect('Category', 'category', product.category);

      form.append(
        nameLabel,
        quantityLabel,
        aisleLabel,
        bayLabel,
        skuLabel,
        categoryLabel
      );

      const buttonRow = document.createElement('div');
      buttonRow.className = 'button-row';

      const saveBtn = document.createElement('button');
      saveBtn.type = 'submit';
      saveBtn.textContent = 'Commit edit';
      saveBtn.className = 'primary';

      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.textContent = 'Delete';
      deleteBtn.className = 'danger';
      deleteBtn.addEventListener('click', () => confirmDelete(productId));

      buttonRow.append(saveBtn, deleteBtn);
      form.appendChild(buttonRow);

      app.append(header, message, form, renderBackToTop());
    }

    function renderAddProduct() {
      setActiveNav('add');
      const app = document.getElementById('app');
      app.innerHTML = '';

      const header = document.createElement('h1');
      header.textContent = 'Add Product';

      const message = document.createElement('div');
      message.id = 'message';

      const form = document.createElement('form');
      form.addEventListener('submit', (event) => {
        event.preventDefault();
        commitAdd();
      });

      const nameLabel = createInput('Product Name', 'name', '');
      const quantityLabel = createInput('Quantity', 'quantity', 0, 'number');
      const aisleLabel = createInput('Aisle', 'aisle', '');
      const bayLabel = createInput('Bay', 'bay', 0, 'number');
      const skuLabel = createInput('SKU', 'sku', 0, 'number');
      const categoryLabel = createSelect('Category', 'category', 'soil');

      form.append(
        nameLabel,
        quantityLabel,
        aisleLabel,
        bayLabel,
        skuLabel,
        categoryLabel
      );

      const buttonRow = document.createElement('div');
      buttonRow.className = 'button-row';

      const createBtn = document.createElement('button');
      createBtn.type = 'submit';
      createBtn.textContent = 'Create Product';
      createBtn.className = 'primary';

      const resetBtn = document.createElement('button');
      resetBtn.type = 'button';
      resetBtn.textContent = 'Reset all fields';
      resetBtn.addEventListener('click', () => {
        form.reset();
        form.querySelector('[name="category"]').value = 'soil';
      });

      buttonRow.append(createBtn, resetBtn);
      form.appendChild(buttonRow);

      app.append(header, message, form, renderBackToTop());
    }

    function createInput(labelText, name, value, type = 'text') {
      const label = document.createElement('label');
      label.textContent = labelText;
      const input = document.createElement('input');
      input.name = name;
      input.type = type;
      input.value = value ?? '';
      if (type === 'number') input.min = '0';
      label.appendChild(input);
      return label;
    }

    function createSelect(labelText, name, currentValue) {
      const label = document.createElement('label');
      label.textContent = labelText;
      const select = document.createElement('select');
      select.name = name;
      CATEGORY_OPTIONS.forEach((cat) => {
        const o = document.createElement('option');
        o.value = cat;
        o.textContent = cat;
        select.appendChild(o);
      });
      select.value = currentValue || CATEGORY_OPTIONS[0];
      label.appendChild(select);
      return label;
    }

    function commitEdit(productId) {
      const form = document.querySelector('form');
      if (!form) return;
      const data = new FormData(form);
      const updated = {
        id: productId,
        name: String(data.get('name') ?? '').trim(),
        quantity: Number(data.get('quantity') ?? 0),
        aisle: String(data.get('aisle') ?? '').trim(),
        bay: Number(data.get('bay') ?? 0),
        sku: Number(data.get('sku') ?? 0),
        category: String(data.get('category') ?? 'soil'),
      };

      if (!updated.name) {
        showMessage('Product name is required.', 'error');
        return;
      }

      if (!CATEGORY_OPTIONS.includes(updated.category)) {
        showMessage('Invalid category.', 'error');
        return;
      }

      const products = loadProducts();
      const idx = products.findIndex((p) => p.id === productId);
      if (idx === -1) {
        showMessage('Product no longer exists.', 'error');
        return;
      }

      products[idx] = updated;
      saveProducts(products);
      showMessage('Product updated.', 'success');
      renderHome();
    }

    function commitAdd() {
      const form = document.querySelector('form');
      if (!form) return;
      const data = new FormData(form);
      const product = {
        id: crypto.randomUUID(),
        name: String(data.get('name') ?? '').trim(),
        quantity: Number(data.get('quantity') ?? 0),
        aisle: String(data.get('aisle') ?? '').trim(),
        bay: Number(data.get('bay') ?? 0),
        sku: Number(data.get('sku') ?? 0),
        category: String(data.get('category') ?? 'soil'),
      };

      if (!product.name) {
        showMessage('Product name is required.', 'error');
        return;
      }

      if (!CATEGORY_OPTIONS.includes(product.category)) {
        showMessage('Invalid category.', 'error');
        return;
      }

      const products = loadProducts();
      products.push(product);
      saveProducts(products);
      showMessage('Product created.', 'success');
      location.hash = '#/';
    }

    function showMessage(text, type) {
      const el = document.getElementById('message');
      if (!el) return;
      el.textContent = text;
      el.className = `message ${type}`;
      setTimeout(() => {
        if (el.textContent === text) {
          el.textContent = '';
          el.className = '';
        }
      }, 3000);
    }

    function confirmDelete(productId) {
      const app = document.getElementById('app');
      const existing = app.querySelector('.confirm-delete');
      if (existing) return;

      const container = document.createElement('div');
      container.className = 'confirm-delete';
      container.style.padding = '1rem';
      container.style.border = '1px solid #f5c2c7';
      container.style.borderRadius = '10px';
      container.style.background = '#f8d7da';
      container.style.marginTop = '1rem';

      const text = document.createElement('p');
      text.textContent = 'Are you sure you want to delete this product?';

      const buttons = document.createElement('div');
      buttons.className = 'button-row';

      const yes = document.createElement('button');
      yes.type = 'button';
      yes.textContent = 'Yes, delete';
      yes.className = 'danger';
      yes.addEventListener('click', () => {
        deleteProduct(productId);
      });

      const no = document.createElement('button');
      no.type = 'button';
      no.textContent = 'Cancel';
      no.addEventListener('click', () => {
        container.remove();
      });

      buttons.append(yes, no);
      container.append(text, buttons);
      app.appendChild(container);
      container.scrollIntoView({ behavior: 'smooth' });
    }

    function deleteProduct(productId) {
      const products = loadProducts();
      const next = products.filter((p) => p.id !== productId);
      saveProducts(next);
      location.hash = '#/';
    }

    function renderNotFound(message = 'Page not found.') {
      setActiveNav('');
      const app = document.getElementById('app');
      app.innerHTML = '';
      const el = document.createElement('div');
      const header = document.createElement('h1');
      header.textContent = 'Not found';
      const msg = document.createElement('p');
      msg.textContent = message;
      el.append(header, msg, renderBackToTop());
      app.appendChild(el);
    }

    function renderRoute() {
      const hash = window.location.hash;
      const parts = hash.replace(/^#\/?/, '').split('/');
      if (!hash || hash === '#/' || parts[0] === '') {
        renderHome();
        return;
      }

      if (parts[0] === 'add') {
        renderAddProduct();
        return;
      }

      if (parts[0] === 'product' && parts[1]) {
        renderProductDetail(parts[1]);
        return;
      }

      renderNotFound();
    }

    function init() {
      updateFilterButtons();
      window.addEventListener('hashchange', renderRoute);
      document.querySelectorAll('[data-filter]').forEach((btn) => {
        btn.addEventListener('click', () => {
          setFilterCategory(btn.getAttribute('data-filter'));
        });
      });

      document.querySelector('[data-toggle="needed"]').addEventListener('click', toggleNeeded);
      document.querySelector('[data-action="reset"]').addEventListener('click', () => {
        const products = loadProducts().map((p) => ({ ...p, quantity: 0 }));
        saveProducts(products);
        renderRoute();
      });

      renderRoute();
    }

    init();
  </script>
</body>
</html>
